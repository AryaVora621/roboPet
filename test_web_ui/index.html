<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>roboPet OS - Hardware Test</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-grad: linear-gradient(135deg, #0f172a, #1e293b);
            --card-bg: rgba(255, 255, 255, 0.03);
            --card-border: rgba(255, 255, 255, 0.08);
            --accent: #38bdf8;
            --accent-hover: #0284c7;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Outfit', sans-serif;
            background: var(--bg-grad);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .dashboard-container {
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: 24px;
            padding: 40px;
            width: 100%;
            max-width: 400px;
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5), inset 0 1px 0 rgba(255, 255, 255, 0.1);
            animation: fadeIn 0.8s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px) scale(0.98); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }

        h1 {
            font-weight: 600;
            margin-top: 0;
            font-size: 28px;
            text-align: center;
            background: -webkit-linear-gradient(45deg, #38bdf8, #818cf8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 40px;
        }

        .control-group {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-bottom: 30px;
        }

        label {
            font-size: 13px;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 1.5px;
            font-weight: 600;
        }

        input[type="text"] {
            width: 100%;
            padding: 16px;
            border-radius: 12px;
            border: 1px solid var(--card-border);
            background: rgba(0, 0, 0, 0.3);
            color: white;
            font-size: 16px;
            font-family: 'Outfit', sans-serif;
            outline: none;
            transition: border-color 0.3s, box-shadow 0.3s;
            box-sizing: border-box;
        }

        input[type="text"]:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(56, 189, 248, 0.2);
        }

        button {
            width: 100%;
            padding: 16px;
            border-radius: 12px;
            border: none;
            background: var(--accent);
            color: #fff;
            font-size: 16px;
            font-weight: 600;
            font-family: 'Outfit', sans-serif;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
            box-shadow: 0 4px 14px 0 rgba(56, 189, 248, 0.39);
        }

        button:hover {
            background: var(--accent-hover);
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(56, 189, 248, 0.23);
        }

        button:active {
            transform: translateY(0);
        }

        .color-picker-wrapper {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: rgba(0, 0, 0, 0.3);
            padding: 12px 20px;
            border-radius: 12px;
            border: 1px solid var(--card-border);
            transition: border-color 0.3s;
        }

        .color-picker-wrapper:hover {
            border-color: rgba(255,255,255,0.2);
        }

        input[type="color"] {
            -webkit-appearance: none;
            border: none;
            width: 44px;
            height: 44px;
            border-radius: 50%;
            cursor: pointer;
            background: none;
        }

        input[type="color"]::-webkit-color-swatch-wrapper {
            padding: 0;
        }

        input[type="color"]::-webkit-color-swatch {
            border: none;
            border-radius: 50%;
            box-shadow: 0 0 10px rgba(0,0,0,0.4);
        }
        
        .status-msg {
            margin-top: 20px;
            font-size: 14px;
            text-align: center;
            color: #34d399;
            opacity: 0;
            transition: opacity 0.3s;
            font-weight: 600;
        }

        .servo-grid {
            display: grid;
            grid-template-columns: repeat(6, 1fr);
            gap: 6px;
        }

        .btn-servo {
            width: 100%;
            padding: 10px 2px;
            border-radius: 8px;
            border: 1px solid var(--card-border);
            background: rgba(0,0,0,0.3);
            color: var(--text-main);
            font-size: 11px;
            font-weight: 600;
            font-family: 'Outfit', sans-serif;
            cursor: pointer;
            transition: all 0.2s;
            box-shadow: none;
        }

        .btn-servo:hover {
            background: var(--accent);
            border-color: var(--accent);
            transform: translateY(-1px);
        }

        .btn-servo:active { transform: translateY(0); }

        .btn-servo.center {
            border-color: rgba(56, 189, 248, 0.4);
            color: var(--accent);
        }

        .servo-label {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .servo-angle-display {
            font-size: 13px;
            color: var(--accent);
            font-weight: 600;
        }
    </style>
</head>
<body>
    <div class="dashboard-container">
        <h1>roboPet Dashboard</h1>
        
        <div class="control-group">
            <label>Send Text to Screen</label>
            <div style="display: flex; gap: 10px; flex-direction: column;">
                <input type="text" id="textInput" placeholder="Hello World!" maxlength="48">
                <button class="btn" onclick="sendText()">Update Screen</button>
            </div>
        </div>

        <div class="control-group">
            <label>Emotive Faces</label>
            <div style="display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px;">
                <button onclick="setFace('neutral')">Neutral</button>
                <button onclick="setFace('happy')">Happy</button>
                <button onclick="setFace('sad')">Sad</button>
                <button onclick="setFace('angry')">Angry</button>
                <button onclick="setFace('sleepy')">Sleepy</button>
                <button onclick="setFace('look_left')">&lt; Left</button>
                <button onclick="setFace('look_right')">Right &gt;</button>
            </div>
        </div>

        <div class="control-group">
            <div class="servo-label">
                <label>Servo 1 (Pin 13)</label>
                <span class="servo-angle-display" id="servo0-angle">STOP</span>
            </div>
            <div class="servo-grid">
                <button class="btn-servo" onclick="setServo(0, -180)">◀◀</button>
                <button class="btn-servo" onclick="setServo(0, -90)">◀ 50%</button>
                <button class="btn-servo" onclick="setServo(0, -45)">◀ 25%</button>
                <button class="btn-servo" onclick="setServo(0, -30)">◀ 17%</button>
                <button class="btn-servo" onclick="setServo(0, -15)">◀ 8%</button>
                <button class="btn-servo center" onclick="setServo(0, 0)">STOP</button>
                <button class="btn-servo" onclick="setServo(0, 15)">8% ▶</button>
                <button class="btn-servo" onclick="setServo(0, 30)">17% ▶</button>
                <button class="btn-servo" onclick="setServo(0, 45)">25% ▶</button>
                <button class="btn-servo" onclick="setServo(0, 90)">50% ▶</button>
                <button class="btn-servo" onclick="setServo(0, 180)">▶▶</button>
            </div>
        </div>

        <div class="control-group">
            <div class="servo-label">
                <label>Servo 2 (Pin 14)</label>
                <span class="servo-angle-display" id="servo1-angle">STOP</span>
            </div>
            <div class="servo-grid">
                <button class="btn-servo" onclick="setServo(1, -180)">◀◀</button>
                <button class="btn-servo" onclick="setServo(1, -90)">◀ 50%</button>
                <button class="btn-servo" onclick="setServo(1, -45)">◀ 25%</button>
                <button class="btn-servo" onclick="setServo(1, -30)">◀ 17%</button>
                <button class="btn-servo" onclick="setServo(1, -15)">◀ 8%</button>
                <button class="btn-servo center" onclick="setServo(1, 0)">STOP</button>
                <button class="btn-servo" onclick="setServo(1, 15)">8% ▶</button>
                <button class="btn-servo" onclick="setServo(1, 30)">17% ▶</button>
                <button class="btn-servo" onclick="setServo(1, 45)">25% ▶</button>
                <button class="btn-servo" onclick="setServo(1, 90)">50% ▶</button>
                <button class="btn-servo" onclick="setServo(1, 180)">▶▶</button>
            </div>
        </div>

        <div class="control-group">
            <label for="led-color">WS2811 LED Color</label>
            <div class="color-picker-wrapper">
                <span>Choose Color</span>
                <input type="color" id="led-color" value="#38bdf8" onchange="updateColor()">
            </div>
        </div>

        <div id="status" class="status-msg">Command sent!</div>
    </div>

    <script>
        function showStatus(msg, isError = false) {
            const statusEl = document.getElementById('status');
            statusEl.innerText = msg;
            statusEl.style.color = isError ? '#f87171' : '#34d399';
            statusEl.style.opacity = 1;
            setTimeout(() => {
                statusEl.style.opacity = 0;
            }, 2500);
        }

        async function sendText() {
            const text = document.getElementById('textInput').value;
            try {
                const response = await fetch(`/api/text?msg=${encodeURIComponent(text)}`);
                if(response.ok) showStatus('OLED updated successfully!');
                else showStatus('Failed to update OLED.', true);
            } catch (err) {
                console.error(err);
                showStatus('Network error.', true);
            }
        }

        async function updateColor() {
            const hex = document.getElementById('led-color').value;
            const r = parseInt(hex.slice(1, 3), 16);
            const g = parseInt(hex.slice(3, 5), 16);
            const b = parseInt(hex.slice(5, 7), 16);
            try {
                const response = await fetch(`/api/color?r=${r}&g=${g}&b=${b}`);
                if(response.ok) showStatus('LED color updated!');
                else showStatus('Failed to update LED.', true);
            } catch (err) {
                console.error(err);
                showStatus('Network error.', true);
            }
        }

        async function setServo(id, offset) {
            // offset: -180=full rev, 0=stop, +180=full fwd. Maps to 0-180 for API (90=stop).
            const angle = Math.max(0, Math.min(180, 90 + offset));
            const pct = Math.round((offset / 180) * 100);
            const label = offset === 0 ? 'STOP' : `${pct > 0 ? '+' : ''}${pct}%`;
            document.getElementById(`servo${id}-angle`).innerText = label;
            try {
                const response = await fetch(`/api/servo?id=${id}&angle=${angle}`);
                if (response.ok) showStatus(`Servo ${id + 1}: ${label}`);
                else showStatus('Servo command failed.', true);
            } catch (err) {
                showStatus('Network error.', true);
            }
        }

        async function setFace(type) {
            try {
                const response = await fetch(`/api/face?type=${type}`);
                if(response.ok) showStatus('Face updated!');
                else showStatus('Failed to update face.', true);
            } catch (err) {
                console.error(err);
                showStatus('Network error.', true);
            }
        }
    </script>
</body>
</html>
